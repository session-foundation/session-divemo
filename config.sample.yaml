# session-divemo configuration SAMPLE.
#
# Copy this file to config.yaml and fill in the real values. config.yaml is
# git-ignored and must NOT be committed (it contains the bot token and the
# list of users to tag). Only this sample is tracked.

discord:
  # Bot token (or leave blank and set $DISCORD_BOT_TOKEN in the environment).
  token: "YOUR_DISCORD_BOT_TOKEN"
  # The channel the bot posts alerts / status updates into.
  channel_id: 000000000000000000
  # Optional: a guild (server) id. If set, slash commands are synced to that
  # guild for instant availability; otherwise they sync globally (~1h lag).
  guild_id: 000000000000000000

# How often to poll each source, in seconds (default 300 = every 5 min). Don't
# go much below 60s: the Play Store is scraped (no API) and may soft-block, and
# GitHub allows only 60 unauthenticated req/h (36/h at this default across the
# 3 repos, comfortably under).
check_interval_seconds: 300

# How often (hours) to repeat an unresolved warning until it clears. Default 12.
warning_reminder_hours: 12

# Path to the SQLite state database (git-ignored). For the systemd system
# service, point this at the StateDirectory: "/var/lib/divemo/divemo.db".
state_db: "divemo.db"

github:
  # Optional personal access token to raise the GitHub API rate limit. Only
  # needed if you poll faster than ~60s; unauthenticated (60 req/h) is plenty at
  # the default interval. Leaving this blank also avoids org token policies.
  token: ""

platforms:
  android:
    display_name: "Session Android"
    github_repo: "session-android"
    store:
      store: play
      app_id: "network.loki.messenger"
    tag_user_ids:
      - 111111111111111111
      - 222222222222222222

  # Session Android is also published to our F-Droid repo (session-fdroid). The
  # release process auto-opens a "Release X.Y.Z" PR there that must be merged
  # right after the GitHub release. Two checks track this, both against the
  # session-android GitHub release:
  android_fdroid_merged:
    display_name: "Session Android (F-Droid, merged)"
    github_repo: "session-android"
    # Our repo: the merged release PR must EXACTLY match GitHub, so warn on ANY
    # divergence (behind = the release PR wasn't merged). Same as desktop's APT.
    strict_sync: true
    store:
      store: fdroid
      # The index committed to session-fdroid's default branch == the merged
      # state (its default branch is "master", not "main").
      base_url: "https://raw.githubusercontent.com/session-foundation/session-fdroid/master/fdroid/repo"
      app_id: "network.loki.messenger"
    tag_user_ids:
      - 111111111111111111

  android_fdroid_live:
    display_name: "Session Android (F-Droid, live)"
    github_repo: "session-android"
    # The version F-Droid users actually pick up. App-store semantics (no
    # strict_sync): being behind is normal deploy/propagation lag -> info only.
    store:
      store: fdroid
      base_url: "https://fdroid.getsession.org/fdroid/repo"
      app_id: "network.loki.messenger"
    tag_user_ids:
      - 111111111111111111

  ios:
    display_name: "Session iOS"
    github_repo: "session-ios"
    store:
      store: appstore
      bundle_id: "com.loki-project.loki-messenger"
    tag_user_ids:
      - 333333333333333333

  desktop:
    display_name: "Session Desktop"
    github_repo: "session-desktop"
    # strict_sync: the APT repo is ours and must always match GitHub, so warn on
    # ANY divergence — behind as well as ahead. (App stores above omit this: only
    # the store being *ahead* of GitHub warns.)
    strict_sync: true
    store:
      store: deb
      base_url: "https://deb.session.foundation"
      package: "session-desktop"
      suite: "sid"
      component: "main"
      arch: "amd64"
    tag_user_ids:
      - 444444444444444444
      - 555555555555555555
